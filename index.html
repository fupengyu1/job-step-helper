<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一步一屏｜岗位执行支持器</title>
    <meta name="description" content="把岗位SOP拆成一步一屏 + 沟通卡片 + 记录导出（CSV），支持离线使用。" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>一步一屏｜岗位执行支持器</h1>
      <div class="sub">大字号 · 高对比 · 现场可用</div>
    </header>

    <main class="app-main">
      <section class="panel panel-left">
        <h2>① 选择岗位</h2>
        <div id="job-list" class="job-list"></div>

        <h2>② 沟通卡片</h2>
        <div class="tabs">
          <button class="tab-btn active" data-tab="need" type="button">我需要…</button>
          <button class="tab-btn" data-tab="feel" type="button">我感觉…</button>
          <button class="tab-btn" data-tab="ask" type="button">请你…</button>
        </div>
        <div id="card-list" class="card-list"></div>
      </section>

      <section class="panel panel-right">
        <h2>③ 步骤执行</h2>
        <div id="step-container" class="step-container">
          <p class="placeholder">请先在左侧选择一个岗位</p>
        </div>

        <div class="step-controls">
          <button id="btn-start" disabled type="button">开始</button>
          <button id="btn-prev" disabled type="button">上一步</button>
          <button id="btn-next" disabled type="button">下一步</button>
          <button id="btn-complete" disabled type="button">完成并记录</button>
          <button id="btn-reset" disabled type="button" class="danger">重置本次</button>
        </div>

        <h3>④ 本次记录</h3>
        <div id="session-info" class="session-info">
          <p>当前没有进行中的任务</p>
        </div>

        <div class="export-row">
          <button id="btn-export" class="export-btn" type="button">导出记录 CSV</button>
          <button id="btn-clear-history" class="export-btn secondary" type="button">清空所有记录</button>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <small>
        首次打开后支持离线使用（PWA 缓存） · 建议平板横屏 · 如遇中断可自动恢复到上次步骤
      </small>
    </footer>

    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./service-worker.js");
        });
      }
    </script>
  </body>
</html>
